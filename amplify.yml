version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist/angular-app/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - /root/.pnpm-store/**/*
