<a
  (click)="scrollToSimulador()"
  (keydown.enter)="scrollToSimulador()"
  tabindex="0"
  role="button"
  class="btn-ripple cursor-pointer">
  <div class="btn-icon">
    <img
      src="/assets/images/icon_simulador.png"
      alt="Simular crédito"
      width="60"
      height="60"
      draggable="false"
    />
  </div>
  <span [class.claro]="useClaro">{{ text }}</span>
</a>
