<header class="fk-header">
  <div class="fk-header__inner">
    <a routerLink="/" class="fk-header__brand" aria-label="Ir a Finky">
      <img src="/assets/images/finkylogo.jpg" alt="Finky" class="fk-header__logo-finky" />
    </a>

    <span class="fk-header__divider" aria-hidden="true"></span>

    <div class="fk-header__university">
      @if (universityIcon) {
        <img [src]="universityIcon" alt="Logo institución" class="fk-header__logo-uni" />
      } @else {
        <span class="fk-header__placeholder">Tu institución</span>
      }
    </div>
  </div>
</header>
