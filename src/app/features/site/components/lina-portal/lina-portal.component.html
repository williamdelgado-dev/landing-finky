<!-- Floating Button Lina Portal -->
<div
  class="lina-trigger"
  tabindex="0" role="button" (click)="openModal()"
  (keydown.enter)="openModal()">
  <div class="lina-avatar-container">
    <img class="lina-avatar-img" src="/assets/images/lina/lina2.png" alt="Lina" />
  </div>
</div>

<!-- Modal Lina Portal -->
<div class="modal-overlay" [class.active]="isModalOpen()" tabindex="-1">
  <div class="modal-content">
    <button class="modal-close" (click)="closeModal()">
      <span class="material-icons">close</span>
    </button>

    <div class="modal-header">
      <h3 class="modal-title">¿Hablamos?</h3>
      <p class="modal-subtitle">Ingresa tus datos y Lina te llamará de inmediato.</p>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="portalName">Tu nombre</label>
        <div class="input-wrapper">
          <span class="material-icons">person_outline</span>
          <input id="portalName" type="text" [(ngModel)]="name"
            placeholder="Ej: Camilo" />
        </div>
      </div>

      <div class="form-group">
        <label for="portalPhone">Tu celular</label>
        <div class="input-wrapper">
          <span class="material-icons">smartphone</span>
          <input id="portalPhone" type="tel" [(ngModel)]="phone"
            placeholder="310 000 0000" />
        </div>
      </div>

      <div class="form-check">
        <input type="checkbox" id="portalHabeas" [(ngModel)]="habeasData" />
        <label for="portalHabeas">Acepto la <a href="#">política de privacidad</a></label>
      </div>

      <button class="btn-submit" (click)="sendCallbackRequest()"
        [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="spinner"></span>
          <span>Procesando...</span>
        } @else {
          <span>Llamarme ahora</span>
          <span class="material-icons">headset_mic</span>
        }
      </button>
    </div>
  </div>
</div>
